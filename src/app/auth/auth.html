<div class="auth">
  <h3 class="auth__title">Login</h3>

  <p style="font-size: 0.85rem; color: #555">
    Admin: <strong>admin / admin123</strong> &nbsp;|&nbsp; Viewer: <strong>john / user123</strong>
  </p>

  @if (errorMessage) {
    <p style="color: red">{{ errorMessage }}</p>
  }

  <section class="auth__section">
    <div class="auth__form-field">
      <label for="username">Username</label>
      <input id="username" [(ngModel)]="username" placeholder="Enter username" />
    </div>

    <div class="auth__form-field">
      <label for="password">Password</label>
      <input id="password" type="password" [(ngModel)]="password" placeholder="Enter password" />
    </div>

    <button type="button" (click)="onLogin()" class="auth__button login">Log in</button>
  </section>
</div>
